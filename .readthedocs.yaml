# Read the Docs configuration for StateRustimation / Rusty Givens
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# IMPORTANT: This documentation covers only the FREE edition. Pro features
# (crates/pro/, observability, redundancy, BDD) are in dedicated private
# directories and are not documented here.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# MkDocs builds the documentation from Markdown sources
mkdocs:
  configuration: mkdocs.yml
  # fail_on_warning: true  # Uncomment to catch broken links

# Reproducible builds: pin MkDocs and theme versions
python:
  install:
    - requirements: docs/requirements.txt
