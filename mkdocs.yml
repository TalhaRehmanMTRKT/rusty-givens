# MkDocs configuration for StateRustimation / Rusty Givens
# Free edition: detailed implementation. Pro edition: capabilities overview.
# https://www.mkdocs.org/user-guide/configuration/

site_name: Rusty Givens
site_description: A modular AC Weighted Least-Squares State Estimator for power systems in Rust
site_url: https://rusty-givens.readthedocs.io/  # Update after RTD project creation
repo_url: https://github.com/haraldjendrian/rusty-givens
repo_name: rusty-givens
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: "#003B5C"   # Circuit Board Blue
      accent: "#E67E22"    # Oxide Orange
      scheme: default
    - media: "(prefers-color-scheme: dark)"
      primary: "#004e7c"
      accent: "#f0944d"
      scheme: slate
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
  favicon: assets/logo.png

plugins:
  - search:
      lang: en

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - admonition
  - attr_list

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Architecture: architecture.md
  - REST API: api.md
  - Sequence Diagrams: sequence-diagram.md
  - Case Study: case-study.md
  - Pro Edition: pro.md
  - References: references.md
