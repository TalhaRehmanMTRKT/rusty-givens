syntax = "proto3";

package rusty_givens.v1;

// ─── Enumerations ─────────────────────────────────────────────────────

enum Factorization {
  FACTORIZATION_UNSPECIFIED = 0;
  DENSE_CHOLESKY = 1;
  SPARSE_CHOLESKY = 2;
  SPARSE_LU = 3;
}

// ─── Network topology ─────────────────────────────────────────────────

message BusNode {
  uint32 index = 1;
  uint32 label = 2;
  double vn_kv = 3;
  uint32 bus_type = 4;
  optional double geo_x = 5;
  optional double geo_y = 6;
}

message BranchEdge {
  uint32 index = 1;
  uint32 from_bus = 2;
  uint32 to_bus = 3;
}

message NetworkResponse {
  uint32 n_buses = 1;
  uint32 n_branches = 2;
  uint32 slack_bus_index = 3;
  double base_mva = 4;
  repeated BusNode buses = 5;
  repeated BranchEdge branches = 6;
}

// ─── True state ───────────────────────────────────────────────────────

message TrueStateResponse {
  repeated double voltage_magnitude = 1;
  repeated double voltage_angle_deg = 2;
}

// ─── Estimation ───────────────────────────────────────────────────────

message EstimateRequest {
  Factorization factorization = 1;
  optional uint32 max_iterations = 2;
  optional double tolerance = 3;
  optional bool skip_obs_check = 4;
  optional ObsMethod obs_method = 5;
}

message BusResult {
  uint32 index = 1;
  uint32 label = 2;
  double est_vm = 3;
  double est_va_deg = 4;
  double true_vm = 5;
  double true_va_deg = 6;
  double vm_error = 7;
  double va_error_deg = 8;
}

// ─── Bad Data Detection ───────────────────────────────────────────────

message ChiSquaredResult {
  bool bad_data_suspected = 1;
  double objective = 2;
  double threshold = 3;
  uint32 degrees_of_freedom = 4;
}

message FlaggedMeasurement {
  uint32 index = 1;
  double normalized_residual = 2;
  double raw_residual = 3;
  double omega_ii = 4;
  string measurement_type = 5;
  string measurement_label = 6;
}

message RnMaxResult {
  bool bad_data_detected = 1;
  double compute_time_s = 2;
  repeated FlaggedMeasurement top_residuals = 3;
}

message BddResult {
  optional ChiSquaredResult chi_squared = 1;
  optional RnMaxResult rn_max = 2;
}

message EstimateResponse {
  bool converged = 1;
  uint32 iterations = 2;
  double se_time_seconds = 3;
  double final_increment = 4;
  Factorization factorization = 5;
  double tolerance = 6;
  uint32 max_iterations = 7;
  double vm_mae = 8;
  double vm_max_error = 9;
  double va_mae_deg = 10;
  double va_max_error_deg = 11;
  repeated BusResult buses = 12;
  optional BddResult bdd = 13;
  optional RunObsResponse obs_check = 14;
}

// ─── Standalone BDD ───────────────────────────────────────────────────

message BddConfig {
  optional double chi2_confidence = 1;
  optional double rn_max_threshold = 2;
  optional uint32 top_k = 3;
}

message RunBddRequest {
  optional BddConfig config = 1;
}

message RunBddResponse {
  optional ChiSquaredResult chi_squared = 1;
  optional RnMaxResult rn_max = 2;
  double compute_time_s = 3;
}

// ─── Observability Analysis ───────────────────────────────────────────

enum ObsMethod {
  OBS_METHOD_UNSPECIFIED = 0;
  OBS_NUMERICAL = 1;
  OBS_TOPOLOGICAL = 2;
}

message ObsConfig {
  ObsMethod method = 1;
  optional double zero_pivot_threshold = 2;
}

message ObservableIsland {
  uint32 island_id = 1;
  repeated uint32 bus_indices = 2;
  repeated uint32 branch_indices = 3;
}

message SubModelResult {
  string kind = 1;                         // "P-θ" or "Q-V"
  bool observable = 2;
  repeated ObservableIsland islands = 3;
  repeated uint32 unobservable_buses = 4;
  repeated uint32 unobservable_branches = 5;
  repeated uint32 zero_pivot_states = 6;
  uint32 n_measurements_used = 7;
}

message PqPairCheck {
  bool all_paired = 1;
  uint32 n_paired = 2;
  repeated string unpaired_wattmeters = 3;
  repeated string unpaired_varmeters = 4;
  repeated uint32 paired_bus_indices = 5;
}

message BusObsStatus {
  uint32 bus_index = 1;
  bool p_theta_observable = 2;
  bool q_v_observable = 3;
  optional uint32 p_theta_island_id = 4;
  optional uint32 q_v_island_id = 5;
  bool needs_pseudo = 6;
  repeated string pseudo_models = 7;
  string detected_in = 8;
  string pseudo_basis = 9;
  bool paired_observable = 10;
}

message BranchObsStatus {
  uint32 branch_index = 1;
  bool p_theta_observable = 2;
  bool q_v_observable = 3;
  string detected_in = 4;
}

message RunObsRequest {
  optional ObsConfig config = 1;
}

message RunObsResponse {
  bool observable = 1;
  SubModelResult p_theta = 2;
  SubModelResult q_v = 3;
  PqPairCheck pq_pairs = 4;
  repeated BusObsStatus bus_observability = 5;
  repeated BranchObsStatus branch_observability = 6;
  ObsMethod method = 7;
  double analysis_time_s = 8;
}

// ─── Redundancy Analysis ──────────────────────────────────────────────

message RedConfig {
  optional double w_ii_critical_threshold = 1;
  optional double detection_sensitivity_min = 2;
  optional double lambda_k = 3;
}

message MeasRedundancy {
  uint32 index = 1;
  string measurement_type = 2;
  string measurement_label = 3;
  string sub_system = 4;
  double w_ii = 5;
  double max_abs_k_ik = 6;
  optional uint32 max_k_ik_partner = 7;
  string redundancy_class = 8;
  bool detection_reliable = 9;
  double coupling_indicator = 10;
  repeated uint32 associated_buses = 11;
}

message GlobalRedundancy {
  uint32 n_buses = 1;
  uint32 n_state_variables = 2;
  uint32 n_measurements = 3;
  int64 degrees_of_freedom = 4;
  double redundancy_ratio = 5;
  uint32 n_voltmeters = 6;
  uint32 n_ammeters = 7;
  uint32 n_wattmeters = 8;
  uint32 n_varmeters = 9;
  uint32 n_pmu_pairs = 10;
  bool sufficient = 11;
}

message LocalRedundancy {
  uint32 bus_index = 1;
  uint32 n_connected_measurements = 2;
  double min_w_ii = 3;
  uint32 n_critical = 4;
  uint32 n_simply_redundant = 5;
  uint32 n_multiply_redundant = 6;
}

message RunRedRequest {
  optional RedConfig config = 1;
}

message RunRedResponse {
  GlobalRedundancy global = 1;
  repeated MeasRedundancy measurements = 2;
  repeated LocalRedundancy local = 3;
  uint32 n_critical = 4;
  uint32 n_simply_redundant = 5;
  uint32 n_multiply_redundant = 6;
  double analysis_time_s = 7;
}

// ─── Services ─────────────────────────────────────────────────────────

message Empty {}

service EstimateService {
  rpc GetNetwork(Empty) returns (NetworkResponse);
  rpc GetTrueState(Empty) returns (TrueStateResponse);
  rpc RunEstimate(EstimateRequest) returns (EstimateResponse);
  rpc GetLastResult(Empty) returns (EstimateResponse);
}

service BddService {
  rpc RunBdd(RunBddRequest) returns (RunBddResponse);
}

service ObsService {
  rpc RunObservability(RunObsRequest) returns (RunObsResponse);
}

service RedService {
  rpc RunRedundancy(RunRedRequest) returns (RunRedResponse);
}
